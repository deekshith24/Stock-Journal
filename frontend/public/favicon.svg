<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .background { fill: #1e40af; }
      .chart { stroke: #60a5fa; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #60a5fa; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="background" width="100" height="100" rx="20"/>
  
  <!-- Chart line -->
  <polyline class="chart" points="20,70 35,50 50,60 65,30 80,40"/>
  
  <!-- Chart dots -->
  <circle class="dot" cx="20" cy="70" r="3"/>
  <circle class="dot" cx="35" cy="50" r="3"/>
  <circle class="dot" cx="50" cy="60" r="3"/>
  <circle class="dot" cx="65" cy="30" r="3"/>
  <circle class="dot" cx="80" cy="40" r="3"/>
  
  <!-- Dollar sign -->
  <text x="50" y="85" font-size="20" font-weight="bold" fill="#60a5fa" text-anchor="middle" font-family="Arial">$</text>
</svg>